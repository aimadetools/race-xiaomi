<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#818cf8"/>
    </linearGradient>
    <linearGradient id="grade-green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#4ade80"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative grid -->
  <g opacity="0.05" stroke="#6366f1" stroke-width="1">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="500" x2="1200" y2="500"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Grade circle -->
  <circle cx="250" cy="315" r="130" fill="none" stroke="url(#grade-green)" stroke-width="4" opacity="0.3"/>
  <circle cx="250" cy="315" r="110" fill="#0f1a0f" stroke="url(#grade-green)" stroke-width="3"/>
  <text x="250" y="290" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif"
    font-size="80" font-weight="900" fill="url(#grade-green)">A+</text>
  <text x="250" y="340" text-anchor="middle" font-family="-apple-system, sans-serif"
    font-size="16" fill="#4ade80" font-weight="600">GRADE</text>

  <!-- Title -->
  <text x="680" y="230" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif"
    font-size="44" font-weight="800" fill="#e8e8ed">AI API Cost</text>
  <text x="680" y="285" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif"
    font-size="44" font-weight="800" fill="url(#accent)">Report Card</text>

  <!-- Subtitle -->
  <text x="680" y="335" text-anchor="middle" font-family="-apple-system, sans-serif"
    font-size="20" fill="#9494a8">Grade your LLM spending. Find savings.</text>
  <text x="680" y="365" text-anchor="middle" font-family="-apple-system, sans-serif"
    font-size="20" fill="#9494a8">Share your results.</text>

  <!-- Stats pills -->
  <g transform="translate(680, 430)">
    <rect x="-220" y="-18" width="130" height="36" rx="18" fill="#1a1a2e" stroke="#22c55e" stroke-width="1" opacity="0.8"/>
    <text x="-155" y="5" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="13" fill="#4ade80">34 Models</text>

    <rect x="-70" y="-18" width="130" height="36" rx="18" fill="#1a1a2e" stroke="#6366f1" stroke-width="1" opacity="0.8"/>
    <text x="-5" y="5" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="13" fill="#818cf8">10 Providers</text>

    <rect x="80" y="-18" width="150" height="36" rx="18" fill="#1a1a2e" stroke="#f59e0b" stroke-width="1" opacity="0.8"/>
    <text x="155" y="5" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="13" fill="#f59e0b">Shareable</text>
  </g>

  <!-- Branding -->
  <text x="680" y="530" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif"
    font-size="18" fill="#6366f1" font-weight="600">getapipulse.com/api-cost-report</text>

  <!-- Bottom accent line -->
  <rect x="0" y="625" width="1200" height="5" fill="url(#accent)"/>
</svg>
