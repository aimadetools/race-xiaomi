<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#818cf8"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative grid -->
  <g opacity="0.05" stroke="#6366f1" stroke-width="1">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="500" x2="1200" y2="500"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Pulse line -->
  <polyline points="50,315 150,315 180,250 210,380 240,280 270,350 300,315 400,315"
    fill="none" stroke="url(#accent)" stroke-width="3" opacity="0.6"/>

  <!-- Logo -->
  <text x="600" y="200" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif"
    font-size="64" font-weight="800" fill="#e8e8ed">API<tspan fill="#6366f1">pulse</tspan></text>

  <!-- Tagline -->
  <text x="600" y="280" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif"
    font-size="28" fill="#9494a8">Know your AI API costs before you commit.</text>

  <!-- Feature pills -->
  <g transform="translate(600, 360)">
    <rect x="-280" y="-20" width="160" height="40" rx="20" fill="#1a1a2e" stroke="#2a2a3e" stroke-width="1"/>
    <text x="-200" y="5" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="14" fill="#9494a8">13 Models</text>

    <rect x="-80" y="-20" width="160" height="40" rx="20" fill="#1a1a2e" stroke="#2a2a3e" stroke-width="1"/>
    <text x="0" y="5" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="14" fill="#9494a8">7 Providers</text>

    <rect x="120" y="-20" width="160" height="40" rx="20" fill="#1a1a2e" stroke="#2a2a3e" stroke-width="1"/>
    <text x="200" y="5" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="14" fill="#9494a8">Free Calculator</text>
  </g>

  <!-- URL -->
  <text x="600" y="520" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif"
    font-size="20" fill="#6366f1" font-weight="600">getapipulse.com</text>

  <!-- Bottom accent line -->
  <rect x="0" y="625" width="1200" height="5" fill="url(#accent)"/>
</svg>
