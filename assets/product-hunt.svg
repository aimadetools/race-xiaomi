<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240">
  <defs>
    <linearGradient id="accent-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="240" height="240" rx="40" fill="#0a0a0f"/>
  
  <!-- Logo background -->
  <rect x="50" y="50" width="140" height="140" rx="28" fill="url(#accent-grad)"/>
  
  <!-- W letter -->
  <text x="120" y="145" font-family="Arial, sans-serif" font-size="90" font-weight="bold" fill="white" text-anchor="middle">W</text>
</svg>
