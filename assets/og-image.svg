<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a25;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:0" />
    </radialGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg-grad)"/>
  
  <!-- Glow effect -->
  <ellipse cx="600" cy="315" rx="400" ry="300" fill="url(#glow)"/>
  
  <!-- Grid pattern -->
  <g stroke="#2a2a3a" stroke-width="1" opacity="0.3">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>
  
  <!-- Logo -->
  <rect x="520" y="100" width="160" height="160" rx="32" fill="url(#accent-grad)"/>
  <text x="600" y="205" font-family="Arial, sans-serif" font-size="100" font-weight="bold" fill="white" text-anchor="middle">W</text>
  
  <!-- Brand name -->
  <text x="600" y="320" font-family="Arial, sans-serif" font-size="72" font-weight="800" fill="white" text-anchor="middle" letter-spacing="-2">WaitlistKit</text>
  
  <!-- Tagline -->
  <text x="600" y="380" font-family="Arial, sans-serif" font-size="32" fill="#a0a0b0" text-anchor="middle">Build viral waitlists that grow themselves</text>
  
  <!-- CTA badge -->
  <rect x="450" y="430" width="300" height="56" rx="28" fill="url(#accent-grad)"/>
  <text x="600" y="466" font-family="Arial, sans-serif" font-size="22" font-weight="600" fill="white" text-anchor="middle">Get Started Free →</text>
  
  <!-- Stats -->
  <text x="300" y="560" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="url(#accent-grad)" text-anchor="middle">2 min</text>
  <text x="300" y="590" font-family="Arial, sans-serif" font-size="16" fill="#6b6b7b" text-anchor="middle">Setup time</text>
  
  <text x="600" y="560" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="url(#accent-grad)" text-anchor="middle">3x</text>
  <text x="600" y="590" font-family="Arial, sans-serif" font-size="16" fill="#6b6b7b" text-anchor="middle">More signups</text>
  
  <text x="900" y="560" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="url(#accent-grad)" text-anchor="middle">$0</text>
  <text x="900" y="590" font-family="Arial, sans-serif" font-size="16" fill="#6b6b7b" text-anchor="middle">To start</text>
  
  <!-- Decorative dots -->
  <circle cx="100" cy="100" r="4" fill="#6366f1" opacity="0.5"/>
  <circle cx="1100" cy="100" r="4" fill="#a855f7" opacity="0.5"/>
  <circle cx="100" cy="530" r="4" fill="#6366f1" opacity="0.5"/>
  <circle cx="1100" cy="530" r="4" fill="#a855f7" opacity="0.5"/>
</svg>
