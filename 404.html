<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found — APIpulse</title>
    <meta name="description" content="The page you're looking for doesn't exist. Head back to APIpulse to compare AI API pricing.">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-card: #1a1a2e;
            --text-primary: #e8e8ed;
            --text-secondary: #9494a8;
            --text-muted: #6b6b80;
            --accent: #6366f1;
            --accent-hover: #818cf8;
            --border: #2a2a3e;
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        a { color: var(--accent); text-decoration: none; transition: color 0.2s; }
        a:hover { color: var(--accent-hover); }
        nav {
            position: fixed; top: 0; left: 0; right: 0; z-index: 100;
            background: rgba(10, 10, 15, 0.85); backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border); padding: 0 24px;
        }
        .nav-inner {
            max-width: 1200px; margin: 0 auto;
            display: flex; align-items: center; justify-content: space-between;
            height: 64px;
        }
        .logo {
            font-size: 20px; font-weight: 700; color: var(--text-primary);
            display: flex; align-items: center; gap: 8px;
        }
        .logo span { color: var(--accent); }
        .nav-links { display: flex; gap: 32px; align-items: center; }
        .nav-links a { color: var(--text-secondary); font-size: 14px; font-weight: 500; }
        .nav-links a:hover { color: var(--text-primary); }
        .nav-cta {
            background: var(--accent); color: white !important; padding: 8px 20px;
            border-radius: 8px; font-size: 14px; font-weight: 600;
        }
        .nav-cta:hover { background: var(--accent-hover); }
        .error-page {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 140px 24px 80px;
            text-align: center;
        }
        .error-code {
            font-size: 120px;
            font-weight: 800;
            color: var(--accent);
            opacity: 0.3;
            line-height: 1;
            margin-bottom: 16px;
        }
        .error-page h1 {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 12px;
        }
        .error-page p {
            font-size: 16px;
            color: var(--text-secondary);
            max-width: 450px;
            margin: 0 auto 32px;
        }
        .btn-primary {
            background: var(--accent); color: white; padding: 14px 32px;
            border-radius: 10px; font-size: 16px; font-weight: 600;
            border: none; cursor: pointer; transition: all 0.2s;
            display: inline-block;
        }
        .btn-primary:hover { background: var(--accent-hover); transform: translateY(-1px); color: white; }
        footer {
            padding: 40px 24px; border-top: 1px solid var(--border);
            text-align: center; color: var(--text-muted); font-size: 13px;
        }
        footer a { color: var(--text-secondary); }
    </style>
</head>
<body>
    <nav>
        <div class="nav-inner">

                <a href="/blog.html">Blog</a>
                <a href="/#pricing" class="nav-cta">Get Pro — $29</a>
            </div>
        </div>
    </nav>

    <main class="error-page">
        <div class="error-code">404</div>
        <h1>Page not found</h1>
        <p>The page you're looking for doesn't exist or has been moved. Let's get you back on track.</p>
        <a href="/" class="btn-primary">Back to APIpulse</a>
    </main>

    <footer>
        <p>&copy; 2026 APIpulse. Built for developers, by developers. <a href="/about.html">About</a> &middot; <a href="/blog.html">Blog</a></p>
    </footer>
</body>
</html>
