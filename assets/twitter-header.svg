<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 500">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a25;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="glow-left" cx="20%" cy="50%" r="40%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:0" />
    </radialGradient>
    <radialGradient id="glow-right" cx="80%" cy="50%" r="40%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:0" />
    </radialGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1500" height="500" fill="url(#bg-grad)"/>
  
  <!-- Glow effects -->
  <ellipse cx="300" cy="250" rx="300" ry="250" fill="url(#glow-left)"/>
  <ellipse cx="1200" cy="250" rx="300" ry="250" fill="url(#glow-right)"/>
  
  <!-- Grid pattern -->
  <g stroke="#2a2a3a" stroke-width="1" opacity="0.2">
    <line x1="0" y1="100" x2="1500" y2="100"/>
    <line x1="0" y1="200" x2="1500" y2="200"/>
    <line x1="0" y1="300" x2="1500" y2="300"/>
    <line x1="0" y1="400" x2="1500" y2="400"/>
    <line x1="300" y1="0" x2="300" y2="500"/>
    <line x1="600" y1="0" x2="600" y2="500"/>
    <line x1="900" y1="0" x2="900" y2="500"/>
    <line x1="1200" y1="0" x2="1200" y2="500"/>
  </g>
  
  <!-- Logo icon -->
  <rect x="590" y="80" width="100" height="100" rx="20" fill="url(#accent-grad)"/>
  <text x="640" y="148" font-family="Arial, sans-serif" font-size="60" font-weight="bold" fill="white" text-anchor="middle">W</text>
  
  <!-- Brand name -->
  <text x="750" y="240" font-family="Arial, sans-serif" font-size="56" font-weight="800" fill="white" text-anchor="middle" letter-spacing="-1">WaitlistKit</text>
  
  <!-- Tagline -->
  <text x="750" y="290" font-family="Arial, sans-serif" font-size="24" fill="#a0a0b0" text-anchor="middle">Build viral waitlists that grow themselves</text>
  
  <!-- Feature pills -->
  <rect x="350" y="340" width="160" height="40" rx="20" fill="#1a1a25" stroke="#2a2a3a" stroke-width="1"/>
  <text x="430" y="366" font-family="Arial, sans-serif" font-size="16" fill="#a0a0b0" text-anchor="middle">🔗 Referrals</text>
  
  <rect x="540" y="340" width="160" height="40" rx="20" fill="#1a1a25" stroke="#2a2a3a" stroke-width="1"/>
  <text x="620" y="366" font-family="Arial, sans-serif" font-size="16" fill="#a0a0b0" text-anchor="middle">🏆 Leaderboard</text>
  
  <rect x="730" y="340" width="160" height="40" rx="20" fill="#1a1a25" stroke="#2a2a3a" stroke-width="1"/>
  <text x="810" y="366" font-family="Arial, sans-serif" font-size="16" fill="#a0a0b0" text-anchor="middle">⚡ 2-min setup</text>
  
  <rect x="920" y="340" width="160" height="40" rx="20" fill="#1a1a25" stroke="#2a2a3a" stroke-width="1"/>
  <text x="1000" y="366" font-family="Arial, sans-serif" font-size="16" fill="#a0a0b0" text-anchor="middle">📊 Analytics</text>
  
  <!-- Decorative elements -->
  <circle cx="150" cy="100" r="3" fill="#6366f1" opacity="0.4"/>
  <circle cx="1350" cy="100" r="3" fill="#a855f7" opacity="0.4"/>
  <circle cx="150" cy="400" r="3" fill="#6366f1" opacity="0.4"/>
  <circle cx="1350" cy="400" r="3" fill="#a855f7" opacity="0.4"/>
  
  <!-- Corner accents -->
  <path d="M0 0 L60 0 L0 60 Z" fill="url(#accent-grad)" opacity="0.1"/>
  <path d="M1500 0 L1440 0 L1500 60 Z" fill="url(#accent-grad)" opacity="0.1"/>
  <path d="M0 500 L60 500 L0 440 Z" fill="url(#accent-grad)" opacity="0.1"/>
  <path d="M1500 500 L1440 500 L1500 440 Z" fill="url(#accent-grad)" opacity="0.1"/>
</svg>
