<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#818cf8"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#4ade80"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative grid -->
  <g opacity="0.05" stroke="#6366f1" stroke-width="1">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="500" x2="1200" y2="500"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Left: Team icon (3 people silhouettes) -->
  <g transform="translate(140, 200)">
    <!-- Person 1 (center, front) -->
    <circle cx="0" cy="0" r="28" fill="#6366f1" opacity="0.9"/>
    <rect x="-30" y="35" width="60" height="50" rx="12" fill="#6366f1" opacity="0.9"/>
    <!-- Person 2 (left, back) -->
    <circle cx="-55" cy="15" r="22" fill="#818cf8" opacity="0.6"/>
    <rect x="-77" y="42" width="44" height="42" rx="10" fill="#818cf8" opacity="0.6"/>
    <!-- Person 3 (right, back) -->
    <circle cx="55" cy="15" r="22" fill="#818cf8" opacity="0.6"/>
    <rect x="33" y="42" width="44" height="42" rx="10" fill="#818cf8" opacity="0.6"/>
  </g>

  <!-- Main heading -->
  <text x="480" y="190" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif"
    font-size="44" font-weight="800" fill="#e8e8ed">
    AI API Cost Management
  </text>
  <text x="480" y="245" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif"
    font-size="44" font-weight="800" fill="#e8e8ed">
    for Engineering Teams
  </text>

  <!-- Subtitle -->
  <text x="480" y="295" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif"
    font-size="22" fill="#9494a8">Budget · Migrate · Evaluate Providers</text>

  <!-- Divider line -->
  <line x1="480" y1="320" x2="900" y2="320" stroke="#2a2a3e" stroke-width="1"/>

  <!-- 3 tool cards -->
  <g transform="translate(480, 355)">
    <!-- Card 1: Cost Planner -->
    <rect x="0" y="0" width="120" height="70" rx="10" fill="#1a1a2e" stroke="#2a2a3e" stroke-width="1"/>
    <text x="60" y="28" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="22" fill="#6366f1">📊</text>
    <text x="60" y="52" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="11" fill="#e8e8ed" font-weight="600">Cost Planner</text>

    <!-- Card 2: Migration -->
    <rect x="135" y="0" width="120" height="70" rx="10" fill="#1a1a2e" stroke="#2a2a3e" stroke-width="1"/>
    <text x="195" y="28" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="22" fill="#6366f1">🔄</text>
    <text x="195" y="52" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="11" fill="#e8e8ed" font-weight="600">Migration</text>

    <!-- Card 3: Scorecard -->
    <rect x="270" y="0" width="120" height="70" rx="10" fill="#1a1a2e" stroke="#2a2a3e" stroke-width="1"/>
    <text x="330" y="28" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="22" fill="#6366f1">📋</text>
    <text x="330" y="52" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="11" fill="#e8e8ed" font-weight="600">Scorecard</text>
  </g>

  <!-- Savings stat -->
  <g transform="translate(480, 460)">
    <rect x="0" y="0" width="390" height="50" rx="10" fill="rgba(34,197,94,0.1)" stroke="rgba(34,197,94,0.25)" stroke-width="1"/>
    <text x="195" y="30" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="18" fill="#22c55e" font-weight="700">Teams save 30-60% on AI API costs →</text>
  </g>

  <!-- Logo + URL -->
  <text x="1060" y="580" text-anchor="end" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif"
    font-size="18" fill="#6366f1" font-weight="600">API<tspan fill="#818cf8">pulse</tspan></text>
  <text x="1060" y="600" text-anchor="end" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Roboto, sans-serif"
    font-size="13" fill="#5a5a6e">getapipulse.com/teams</text>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>

  <!-- Bottom accent line -->
  <rect x="0" y="626" width="1200" height="4" fill="url(#green)"/>
</svg>
